name: 대장주 분석

on:
  workflow_dispatch:  # 수동 실행

  schedule:
    # 평일 16:00 KST = UTC 07:00 (월~금)
    - cron: '0 7 * * 1-5'

permissions:
  contents: write

jobs:
  analyze-leaders:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install requests python-dotenv

      - name: KIS 토큰 캐시 복원
        uses: actions/cache@v4
        with:
          path: token.json
          key: kis-token

      - name: 대장주 분석 실행
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_IS_MOCK: ${{ vars.KIS_IS_MOCK || 'false' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python analyze_leaders.py

      - name: 데이터 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git diff --cached --quiet || git commit -m "데이터 업데이트 $(date +%Y-%m-%d)"
          git push
